<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurovision 2026 Hottest Guy (You Decide!)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 1200px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .comparison-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .country {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .country-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .rating {
            font-size: 28px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .stats {
            margin-top: 40px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .stats h2 {
            margin-bottom: 15px;
            color: #333;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .photo img {
            max-width: 500px;
            max-height: 500px;
            height: auto;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 24px;
            }
            .comparison-box {
                grid-template-columns: 1fr;
            }
            .photo img {
                max-width: 100%;
                max-height: 300px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 15px;
            }
            h1 {
                font-size: 20px;
                margin-bottom: 20px;
            }
            .country {
                padding: 15px;
            }
            .country-name {
                font-size: 18px;
            }
            .rating {
                font-size: 24px;
            }
            button {
                padding: 10px 15px;
                font-size: 14px;
            }
            .stats {
                margin-top: 20px;
                padding: 15px;
            }
            .stat-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <h1>Eurovision 2026 Hottest Guy (You Decide!)</h1>
        
        <div class="comparison-box">
            <div class="country">
                <div class="country-name" id="country1">Country 1</div>
                <div class="name" id="name1">Name 1</div>
                <div class="rating" id="rating1">1500</div>
                <div class="photo" id="photo1"><img src="" alt=""></div>
                <button onclick="vote(1)">Vote for this</button>
            </div>
            <div class="country">
                <div class="country-name" id="country2">Country 2</div>
                <div class="name" id="name2">Name 2</div>
                <div class="rating" id="rating2">1500</div>
                <div class="photo" id="photo2"><img src="" alt=""></div>
                <button onclick="vote(2)">Vote for this</button>
            </div>
        </div>

        <div class="stats">
            <h2>Top Countries</h2>
            <div id="topList"></div>
        </div>
    </div>

    <script>
        async function vote(choice) {
            const response = await fetch('/api/vote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ winner: choice })
            });
            const data = await response.json();
            loadComparison();
        }

        async function loadComparison() {
            const response = await fetch('/api/comparison');
            const data = await response.json();
            document.getElementById('country1').textContent = data.country1.name;
            document.getElementById('name1').textContent = data.country1.artist_name;
            document.getElementById('rating1').textContent = data.country1.rating;
            document.getElementById('photo1').querySelector('img').src = data.country1.photo;
            document.getElementById('country2').textContent = data.country2.name;
            document.getElementById('name2').textContent = data.country2.artist_name;
            document.getElementById('rating2').textContent = data.country2.rating;
            document.getElementById('photo2').querySelector('img').src = data.country2.photo;
            loadStats();
        }

        async function loadStats() {
            const response = await fetch('/api/top');
            const data = await response.json();
            const topList = document.getElementById('topList');
            topList.innerHTML = data.map(c => 
                `<div class="stat-item"><span>${c[1].name} (${c[0]})</span><span>${c[1].rating}</span></div>`
            ).join('');
        }

        loadComparison();
    </script>
</body>
</html>
